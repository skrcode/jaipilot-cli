project:
  name: jaipilot
  description: Zero-config Java Maven coverage and mutation testing CLI for AI coding agents
  longDescription: JAIPilot is a zero-config Java Maven test safety harness that runs JaCoCo coverage checks and PIT mutation testing, helping Claude Code, Cursor, Codex, and other AI coding agents write and refactor code safely.
  license: MIT
  copyright: 2026 skrcode
  authors:
    - skrcode
  links:
    homepage: https://github.com/skrcode/jaipilot-cli
  languages:
    java:
      groupId: com.jaipilot
      version: 17

release:
  github:
    owner: skrcode
    name: jaipilot-cli
    overwrite: true

distributions:
  jaipilot:
    type: JAVA_BINARY
    stereotype: CLI
    executable:
      name: jaipilot
      windowsExtension: cmd
    artifacts:
      - path: target/distributions/jaipilot-{{projectVersion}}.zip
      - path: target/distributions/jaipilot-{{projectVersion}}.tar.gz
        extraProperties:
          skipBrew: true

packagers:
  brew:
    active: ALWAYS
    multiPlatform: true
    repository:
      active: ALWAYS
      owner: skrcode
      name: homebrew-tap
      branch: main
