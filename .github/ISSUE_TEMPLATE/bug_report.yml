name: Bug report
description: Report a reproducible problem in JAIPilot
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and why is it a bug?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Share the smallest sequence of steps that reproduces the issue.
      placeholder: |
        1. Run `jaipilot generate <class-path>` in ...
        2. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: JAIPilot version
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: java
    attributes:
      label: Java version
      placeholder: 17
    validations:
      required: true
  - type: input
    id: maven
    attributes:
      label: Maven version
      placeholder: 3.9.x
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 15 / Ubuntu 24.04 / Windows 11
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      render: shell
    validations:
      required: false
  - type: markdown
    attributes:
      value: For undisclosed security issues, use the process in `SECURITY.md` instead of filing a public issue.
